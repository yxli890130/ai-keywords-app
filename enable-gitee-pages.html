<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>启用 Gitee Pages</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(135deg, #FAF8F3 0%, #F5F2ED 100%);
      padding: 40px 20px;
      text-align: center;
    }
    .container { max-width: 600px; margin: 0 auto; }
    h1 { color: #C71D23; margin-bottom: 30px; }
    .box {
      background: white;
      border-radius: 20px;
      padding: 30px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.1);
    }
    .step {
      background: #f5f5f5;
      padding: 20px;
      border-radius: 12px;
      margin: 15px 0;
      text-align: left;
    }
    .step-number {
      display: inline-block;
      width: 30px;
      height: 30px;
      background: #C71D23;
      color: white;
      border-radius: 50%;
      text-align: center;
      line-height: 30px;
      margin-right: 10px;
    }
    .btn {
      background: #C71D23;
      color: white;
      padding: 15px 40px;
      border: none;
      border-radius: 50px;
      font-size: 1.2em;
      cursor: pointer;
      margin: 10px;
    }
    .btn:hover { background: #A01820; }
    .code {
      background: #2C4C6E;
      color: #f8f8f2;
      padding: 15px;
      border-radius: 8px;
      font-family: monospace;
      margin: 15px 0;
      text-align: center;
      font-size: 1.1em;
    }
    .success {
      background: #D4EDDA;
      border-left: 4px solid #6B9B4A;
      padding: 20px;
      border-radius: 8px;
      margin-top: 20px;
    }
    .highlight {
      background: #FFF3CD;
      padding: 2px 8px;
      border-radius: 4px;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🇨🇳 启用 Gitee Pages</h1>

    <div class="box">
      <div class="step">
        <span class="step-number">1</span>
        <strong>点击下方按钮打开 Gitee Pages 服务页面</strong>
      </div>

      <button class="btn" onclick="openGiteePages()">
        打开 Gitee Pages 页面
      </button>

      <div class="step">
        <span class="step-number">2</span>
        <strong>在打开的页面中：</strong>
        <ul style="margin: 10px 0 10px 30px;">
          <li>部署分支：<span class="highlight">main</span></li>
          <li>部署目录：<span class="highlight">根目录</span></li>
        </ul>
      </div>

      <div class="step">
        <span class="step-number">3</span>
        <strong>点击 <span class="highlight">"启动"</span> 或 <span class="highlight">"更新"</span> 按钮</strong>
      </div>

      <div class="step">
        <span class="step-number">4</span>
        <strong>等待部署完成（约30秒-1分钟）</strong>
      </div>
    </div>

    <div class="success">
      <h3 style="color: #6B9B4A; margin-bottom: 10px;">🌐 启用后，国内访问链接：</h3>
      <div class="code">
        https://yxli891230.gitee.io/ai-keywords-app/
      </div>
      <p style="margin-top: 15px;">
        <strong>家人在国内无需VPN即可访问！</strong>
      </p>
    </div>

    <div style="margin-top: 30px;">
      <button class="btn" onclick="testConnection()">
        测试连接 →
      </button>
    </div>

    <div id="testResult" style="margin-top: 20px; display: none;"></div>
  </div>

  <script>
    function openGiteePages() {
      window.open('https://gitee.com/yxli891230/ai-keywords-app/pages', '_blank');
    }

    function testConnection() {
      const testResult = document.getElementById('testResult');
      testResult.style.display = 'block';
      testResult.innerHTML = '<p>正在测试连接...</p>';

      fetch('https://yxli891230.gitee.io/ai-keywords-app/')
        .then(response => {
          if (response.ok) {
            testResult.innerHTML = `
              <div class="success">
                <h3 style="color: #6B9B4A;">✅ 连接成功！</h3>
                <p>Gitee Pages 已正常运行！</p>
                <div class="code" style="margin-top: 10px;">
                  <a href="https://yxli891230.gitee.io/ai-keywords-app/" target="_blank" style="color: #f8f8f2;">
                    打开应用 →
                  </a>
                </div>
              </div>
            `;
          } else {
            testResult.innerHTML = '<p style="color: #C71D23;">❌ 连接失败，请确认Pages已启用</p>';
          }
        })
        .catch(error => {
          testResult.innerHTML = '<p style="color: #C71D23;">❌ 连接失败，可能还在部署中，请稍后再试</p>';
        });
    }

    // 自动打开页面
    window.onload = function() {
      setTimeout(openGiteePages, 1000);
    };
  </script>
</body>
</html>
