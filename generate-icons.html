<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>正在生成图标...</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(135deg, #FAF8F3 0%, #F5F2ED 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }
    .container {
      text-align: center;
      padding: 40px;
      background: white;
      border-radius: 20px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.1);
      max-width: 500px;
    }
    .icon {
      width: 100px;
      height: 100px;
      background: linear-gradient(135deg, #C83030 0%, #A02020 100%);
      border-radius: 22px;
      margin: 0 auto 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 10px 30px rgba(200, 48, 48, 0.3);
    }
    .icon svg { width: 60px; height: 60px; }
    h1 { color: #C83030; margin-bottom: 15px; }
    .progress { margin: 20px 0; }
    .progress-bar {
      height: 8px;
      background: #eee;
      border-radius: 4px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: #C83030;
      width: 0%;
      transition: width 0.3s ease;
    }
    .status { color: #666; margin-top: 10px; }
    .btn {
      background: #C83030;
      color: white;
      border: none;
      padding: 15px 40px;
      border-radius: 50px;
      font-size: 1.1em;
      cursor: pointer;
      margin-top: 20px;
    }
    .btn:hover { background: #B02828; }
    .hidden { display: none; }
    .success { color: #6B9B4A; font-size: 1.2em; }
    .instructions {
      background: #E8F4FD;
      padding: 15px;
      border-radius: 8px;
      margin-top: 20px;
      text-align: left;
      font-size: 0.9em;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">
      <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <rect width="100" height="100" fill="url(#bgGrad)" rx="22"/>
        <defs>
          <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#C83030"/>
            <stop offset="100%" style="stop-color:#A02020"/>
          </linearGradient>
        </defs>
        <ellipse cx="50" cy="58" rx="32" ry="27" fill="white" opacity="0.95"/>
        <circle cx="37" cy="54" r="5.5" fill="#C83030"/>
        <circle cx="50" cy="63" r="5.5" fill="#2C4C6E"/>
        <circle cx="63" cy="54" r="5.5" fill="#E89F3C"/>
        <circle cx="42" cy="72" r="3.5" fill="#6B9B4A"/>
        <circle cx="58" cy="75" r="3.5" fill="#9B59B6"/>
        <path d="M 72 38 Q 77 33 82 38 L 87 43 Q 92 48 87 53 L 64 76 Q 59 81 54 76 L 49 71 Q 44 66 49 61 Z" fill="#8B4513"/>
        <circle cx="32" cy="28" r="2.5" fill="#FF6B6B" opacity="0.8"/>
        <circle cx="68" cy="24" r="2" fill="#4ECDC4" opacity="0.8"/>
        <text x="50" y="24" text-anchor="middle" font-size="9" fill="white" font-weight="bold">AI</text>
      </svg>
    </div>
    <h1 id="title">正在生成图标...</h1>
    <div class="progress" id="progress">
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <div class="status" id="status">准备中...</div>
    </div>
    <div id="complete" class="hidden">
      <div class="success">✅ 图标生成完成！</div>
      <div class="instructions">
        <strong>下一步：</strong>
        <ol style="margin-left: 20px; margin-top: 10px;">
          <li>下载的图标已保存到浏览器下载文件夹</li>
          <li>将所有图标文件移动到 <code>icons</code> 文件夹</li>
          <li>确保文件名与列表中一致</li>
        </ol>
      </div>
      <button class="btn" onclick="location.href='index.html'">返回应用</button>
    </div>
  </div>

  <script>
    const iconSVG = `
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
        <defs>
          <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#C83030"/>
            <stop offset="100%" style="stop-color:#A02020"/>
          </linearGradient>
        </defs>
        <rect width="100" height="100" fill="url(#bgGrad)" rx="22"/>
        <ellipse cx="50" cy="58" rx="32" ry="27" fill="white" opacity="0.95"/>
        <circle cx="37" cy="54" r="5.5" fill="#C83030"/>
        <circle cx="50" cy="63" r="5.5" fill="#2C4C6E"/>
        <circle cx="63" cy="54" r="5.5" fill="#E89F3C"/>
        <circle cx="42" cy="72" r="3.5" fill="#6B9B4A"/>
        <circle cx="58" cy="75" r="3.5" fill="#9B59B6"/>
        <path d="M 72 38 Q 77 33 82 38 L 87 43 Q 92 48 87 53 L 64 76 Q 59 81 54 76 L 49 71 Q 44 66 49 61 Z" fill="#8B4513"/>
        <circle cx="32" cy="28" r="2.5" fill="#FF6B6B" opacity="0.8"/>
        <circle cx="68" cy="24" r="2" fill="#4ECDC4" opacity="0.8"/>
        <text x="50" y="24" text-anchor="middle" font-size="9" fill="white" font-weight="bold">AI</text>
      </svg>
    `;

    const icons = [
      { size: 180, filename: 'apple-touch-icon.png' },
      { size: 192, filename: 'icon-192x192.png' },
      { size: 512, filename: 'icon-512x512.png' },
      { size: 72, filename: 'icon-72x72.png' },
      { size: 96, filename: 'icon-96x96.png' },
      { size: 128, filename: 'icon-128x128.png' },
      { size: 144, filename: 'icon-144x144.png' },
      { size: 152, filename: 'icon-152x152.png' },
      { size: 384, filename: 'icon-384x384.png' },
      { size: 32, filename: 'icon-32x32.png' },
      { size: 16, filename: 'icon-16x16.png' },
    ];

    let currentIndex = 0;

    function updateProgress(percent, status) {
      document.getElementById('progressFill').style.width = percent + '%';
      document.getElementById('status').textContent = status;
    }

    function generateAndDownloadIcon() {
      if (currentIndex >= icons.length) {
        document.getElementById('title').textContent = '全部完成！';
        document.getElementById('progress').classList.add('hidden');
        document.getElementById('complete').classList.remove('hidden');
        return;
      }

      const { size, filename } = icons[currentIndex];
      const progress = Math.round(((currentIndex + 1) / icons.length) * 100);
      updateProgress(progress, `正在生成: ${filename} (${size}x${size})`);

      const canvas = document.createElement('canvas');
      canvas.width = size;
      canvas.height = size;
      const ctx = canvas.getContext('2d');

      const img = new Image();
      const svgBlob = new Blob([iconSVG], { type: 'image/svg+xml;charset=utf-8' });
      const url = URL.createObjectURL(svgBlob);

      img.onload = function() {
        ctx.drawImage(img, 0, 0, size, size);
        URL.revokeObjectURL(url);

        canvas.toBlob(blob => {
          const link = document.createElement('a');
          link.href = URL.createObjectURL(blob);
          link.download = filename;
          link.click();

          setTimeout(() => URL.revokeObjectURL(link.href), 100);

          currentIndex++;
          setTimeout(generateAndDownloadIcon, 200);
        });
      };

      img.src = url;
    }

    // 页面加载后延迟开始
    window.onload = () => {
      setTimeout(() => {
        updateProgress(0, '开始生成...');
        setTimeout(generateAndDownloadIcon, 500);
      }, 1000);
    };
  </script>
</body>
</html>
