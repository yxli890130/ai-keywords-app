<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI关键词宝库 - 图标生成器</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(135deg, #FAF8F3 0%, #F5F2ED 100%);
      padding: 40px 20px;
      min-height: 100vh;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    h1 {
      text-align: center;
      color: #C83030;
      margin-bottom: 10px;
      font-size: 2.5em;
    }

    .subtitle {
      text-align: center;
      color: #666;
      margin-bottom: 40px;
    }

    .preview-section {
      background: white;
      border-radius: 20px;
      padding: 40px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
      margin-bottom: 30px;
    }

    .preview-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }

    .preview-item {
      text-align: center;
      padding: 20px;
      background: #FAF8F3;
      border-radius: 12px;
    }

    .preview-item canvas {
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
    }

    .preview-item label {
      display: block;
      margin-top: 10px;
      font-size: 0.9em;
      color: #666;
    }

    .download-section {
      background: white;
      border-radius: 20px;
      padding: 40px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
      text-align: center;
    }

    .btn {
      background: #C83030;
      color: white;
      border: none;
      padding: 15px 40px;
      border-radius: 50px;
      font-size: 1.1em;
      cursor: pointer;
      transition: all 0.3s ease;
      margin: 10px;
    }

    .btn:hover {
      background: #B02828;
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(200, 48, 48, 0.4);
    }

    .btn-secondary {
      background: #2C4C6E;
    }

    .btn-secondary:hover {
      background: #1A2C3E;
    }

    .instructions {
      background: #E8F4FD;
      border-left: 4px solid #2C4C6E;
      padding: 20px;
      border-radius: 8px;
      margin-top: 30px;
      text-align: left;
    }

    .instructions h3 {
      color: #2C4C6E;
      margin-bottom: 10px;
    }

    .instructions ol {
      margin-left: 20px;
      line-height: 1.8;
    }

    .icon-display {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 40px;
      flex-wrap: wrap;
      margin: 30px 0;
    }

    .main-icon {
      width: 200px;
      height: 200px;
      background: linear-gradient(135deg, #C83030 0%, #A02020 100%);
      border-radius: 45px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 10px 30px rgba(200, 48, 48, 0.4);
    }

    .main-icon svg {
      width: 120px;
      height: 120px;
    }

    .icon-preview {
      text-align: center;
    }

    .icon-preview .label {
      margin-top: 10px;
      font-size: 0.9em;
      color: #666;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>AI绘画关键词宝库</h1>
    <p class="subtitle">PWA 图标生成器</p>

    <div class="preview-section">
      <h2 style="text-align: center; margin-bottom: 20px; color: #2C4C6E;">图标预览</h2>
      <div class="icon-display">
        <div class="main-icon">
          <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
            <!-- 调色板主体 -->
            <ellipse cx="50" cy="60" rx="35" ry="30" fill="white" opacity="0.95"/>

            <!-- 调色板孔洞 -->
            <circle cx="35" cy="55" r="6" fill="#C83030"/>
            <circle cx="50" cy="65" r="6" fill="#2C4C6E"/>
            <circle cx="65" cy="55" r="6" fill="#E89F3C"/>
            <circle cx="40" cy="75" r="4" fill="#6B9B4A"/>
            <circle cx="60" cy="78" r="4" fill="#9B59B6"/>

            <!-- 画笔 -->
            <path d="M 75 35 Q 80 30 85 35 L 90 40 Q 95 45 90 50 L 65 75 Q 60 80 55 75 L 50 70 Q 45 65 50 60 Z"
                  fill="#8B4513" stroke="#5D3A1A" stroke-width="1"/>
            <path d="M 85 35 Q 88 38 85 41 L 80 46 Q 77 43 80 40 Z"
                  fill="#C0C0C0"/>

            <!-- 颜色点缀 -->
            <circle cx="30" cy="30" r="3" fill="#FF6B6B" opacity="0.8"/>
            <circle cx="70" cy="25" r="2" fill="#4ECDC4" opacity="0.8"/>
            <circle cx="80" cy="40" r="2.5" fill="#FFE66D" opacity="0.8"/>

            <!-- 文字 -->
            <text x="50" y="25" text-anchor="middle" font-size="10" fill="white" font-weight="bold">AI</text>
          </svg>
        </div>
      </div>
      <div class="preview-grid" id="previewGrid">
        <!-- 由JavaScript生成 -->
      </div>
    </div>

    <div class="download-section">
      <h2 style="margin-bottom: 20px; color: #2C4C6E;">生成并下载图标</h2>
      <button class="btn" onclick="downloadAllIcons()">📥 下载所有图标</button>
      <button class="btn btn-secondary" onclick="generateIcons()">🔄 重新生成</button>

      <div class="instructions">
        <h3>📝 使用说明</h3>
        <ol>
          <li>点击"下载所有图标"按钮，图标将自动下载到您的浏览器下载文件夹</li>
          <li>将下载的图标文件复制到项目的 <code>icons</code> 文件夹中</li>
          <li>确保文件名与 manifest.json 中配置的文件名一致</li>
          <li>在浏览器中打开 <code>index.html</code> 测试PWA功能</li>
          <li>在iPhone Safari中打开后，点击分享按钮 → 添加到主屏幕</li>
        </ol>
      </div>
    </div>
  </div>

  <script>
    // SVG图标源代码
    const iconSVG = `
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
        <defs>
          <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#C83030"/>
            <stop offset="100%" style="stop-color:#A02020"/>
          </linearGradient>
        </defs>
        <rect width="100" height="100" fill="url(#bgGrad)" rx="22"/>
        <ellipse cx="50" cy="58" rx="32" ry="27" fill="white" opacity="0.95"/>
        <circle cx="37" cy="54" r="5.5" fill="#C83030"/>
        <circle cx="50" cy="63" r="5.5" fill="#2C4C6E"/>
        <circle cx="63" cy="54" r="5.5" fill="#E89F3C"/>
        <circle cx="42" cy="72" r="3.5" fill="#6B9B4A"/>
        <circle cx="58" cy="75" r="3.5" fill="#9B59B6"/>
        <path d="M 72 38 Q 77 33 82 38 L 87 43 Q 92 48 87 53 L 64 76 Q 59 81 54 76 L 49 71 Q 44 66 49 61 Z"
              fill="#8B4513" stroke="#5D3A1A" stroke-width="1"/>
        <path d="M 82 38 Q 85 41 82 44 L 77 49 Q 74 46 77 43 Z" fill="#C0C0C0"/>
        <circle cx="32" cy="28" r="2.5" fill="#FF6B6B" opacity="0.8"/>
        <circle cx="68" cy="24" r="2" fill="#4ECDC4" opacity="0.8"/>
        <circle cx="78" cy="38" r="2" fill="#FFE66D" opacity="0.8"/>
        <text x="50" y="24" text-anchor="middle" font-size="9" fill="white" font-weight="bold">AI</text>
      </svg>
    `;

    const sizes = [
      { name: 'iPhone (180x180)', size: 180, filename: 'apple-touch-icon.png' },
      { name: 'iPad (167x167)', size: 167, filename: 'icon-167x167.png' },
      { name: 'iPad Pro (152x152)', size: 152, filename: 'icon-152x152.png' },
      { name: 'iPhone (144x144)', size: 144, filename: 'icon-144x144.png' },
      { name: 'Standard (128x128)', size: 128, filename: 'icon-128x128.png' },
      { name: 'Android (96x96)', size: 96, filename: 'icon-96x96.png' },
      { name: 'Favicon (72x72)', size: 72, filename: 'icon-72x72.png' },
      { name: 'Small (48x48)', size: 48, filename: 'icon-48x48.png' },
      { name: 'Tiny (32x32)', size: 32, filename: 'icon-32x32.png' },
      { name: 'Mini (16x16)', size: 16, filename: 'icon-16x16.png' },
    ];

    const pwaSizes = [192, 384, 512];

    function generateIcons() {
      const previewGrid = document.getElementById('previewGrid');
      previewGrid.innerHTML = '';

      sizes.forEach(({ name, size, filename }) => {
        const canvas = document.createElement('canvas');
        canvas.width = size;
        canvas.height = size;
        const ctx = canvas.getContext('2d');

        const img = new Image();
        const svgBlob = new Blob([iconSVG], { type: 'image/svg+xml;charset=utf-8' });
        const url = URL.createObjectURL(svgBlob);

        img.onload = function() {
          ctx.drawImage(img, 0, 0, size, size);
          URL.revokeObjectURL(url);

          const previewItem = document.createElement('div');
          previewItem.className = 'preview-item';
          previewItem.innerHTML = `
            <canvas width="${Math.min(size, 120)}" height="${Math.min(size, 120)}"></canvas>
            <label>${name}</label>
          `;
          const previewCanvas = previewItem.querySelector('canvas');
          const previewCtx = previewCanvas.getContext('2d');
          previewCtx.drawImage(canvas, 0, 0, Math.min(size, 120), Math.min(size, 120));

          previewGrid.appendChild(previewItem);

          // 保存到canvas对象
          canvas.dataset.filename = filename;
        };

        img.src = url;
      });

      // PWA图标
      pwaSizes.forEach(size => {
        const canvas = document.createElement('canvas');
        canvas.width = size;
        canvas.height = size;
        const ctx = canvas.getContext('2d');

        const img = new Image();
        const svgBlob = new Blob([iconSVG], { type: 'image/svg+xml;charset=utf-8' });
        const url = URL.createObjectURL(svgBlob);

        img.onload = function() {
          ctx.drawImage(img, 0, 0, size, size);
          URL.revokeObjectURL(url);

          const previewItem = document.createElement('div');
          previewItem.className = 'preview-item';
          previewItem.innerHTML = `
            <canvas width="120" height="120"></canvas>
            <label>PWA ${size}x${size}</label>
          `;
          const previewCanvas = previewItem.querySelector('canvas');
          const previewCtx = previewCanvas.getContext('2d');
          previewCtx.drawImage(canvas, 0, 0, 120, 120);

          previewGrid.appendChild(previewItem);

          canvas.dataset.filename = `icon-${size}x${size}.png`;
        };

        img.src = url;
      });
    }

    function downloadAllIcons() {
      const previewGrid = document.getElementById('previewGrid');
      const canvases = previewGrid.querySelectorAll('canvas');

      let index = 0;

      function downloadNext() {
        if (index >= canvases.length) {
          alert('✅ 所有图标已生成并下载！\n\n请将图标文件复制到项目的 icons 文件夹中。');
          return;
        }

        const canvas = canvases[index];
        const originalCanvas = canvas.width === 120 || canvas.height === 120
          ? document.createElement('canvas')
          : canvas;

        // 如果是预览canvas，需要重新生成原图
        if (canvas.width <= 120) {
          const size = parseInt(canvas.parentElement.querySelector('label').textContent.match(/\d+/)[0]);
          originalCanvas.width = size;
          originalCanvas.height = size;
          const ctx = originalCanvas.getContext('2d');

          const img = new Image();
          const svgBlob = new Blob([iconSVG], { type: 'image/svg+xml;charset=utf-8' });
          const url = URL.createObjectURL(svgBlob);

          img.onload = function() {
            ctx.drawImage(img, 0, 0, size, size);
            URL.revokeObjectURL(url);

            const sizeStr = size + 'x' + size;
            let filename = `icon-${sizeStr}.png`;
            if (size === 180) filename = 'apple-touch-icon.png';
            else if (size === 32) filename = 'favicon.ico';

            originalCanvas.toBlob(blob => {
              const link = document.createElement('a');
              link.href = URL.createObjectURL(blob);
              link.download = filename;
              link.click();
              setTimeout(() => URL.revokeObjectURL(link.href), 100);

              index++;
              setTimeout(downloadNext, 100);
            });
          };
          img.src = url;
        } else {
          index++;
          setTimeout(downloadNext, 50);
        }
      }

      downloadNext();
    }

    // 页面加载时生成预览
    window.onload = generateIcons;
  </script>
</body>
</html>
